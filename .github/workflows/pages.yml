name: pages

# Deploys the static landing site from the gh-pages branch root when a release
# version tag is pushed by scripts/release.sh.
#
# To enable: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [gh-pages]
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout homepage branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Remove workflow metadata from artifact
        run: rm -rf site/.git site/.github

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
