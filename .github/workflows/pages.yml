name: pages

# Deploys the static landing site from the gh-pages branch root. Pushing to
# gh-pages (e.g. landing-page edits) triggers a deployment; a manual dispatch
# is also available for forced redeploys.
#
# Triggering off the gh-pages branch (NOT version tags) is deliberate: the
# `environment: github-pages` job below is gated by the Pages deployment
# branch rule, which only permits the gh-pages branch. A v* tag is not on
# that allowlist, so a tag-triggered run is rejected before any step runs
# (instant failure, zero steps) — observed on v0.4.0-pages.1 and v0.4.5.
# Keep this on branch push unless you also relax the environment's
# deployment-branch rule to allow tags.
#
# To enable: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout homepage branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Remove workflow metadata from artifact
        run: rm -rf site/.git site/.github

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
